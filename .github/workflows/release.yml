name: hybrid-gs-windows-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (with or without v), e.g. v1.9.0 or 1.9.0'
        required: true

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW='${{ inputs.tag }}'
          else
            RAW='${{ github.ref_name }}'
          fi
          RAW="${RAW#refs/tags/}"
          RAW="${RAW#v}"
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Hybrid.GS focused Windows binaries
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --bin mhrv-rs
          cargo build --release --target x86_64-pc-windows-msvc --features ui --bin mhrv-rs-ui

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/mhrv-rs.exe dist/mhrv-rs.exe
          if (Test-Path target/x86_64-pc-windows-msvc/release/mhrv-rs-ui.exe) {
            Copy-Item target/x86_64-pc-windows-msvc/release/mhrv-rs-ui.exe dist/mhrv-rs-ui.exe
          }
          Compress-Archive -Path dist/* -DestinationPath "hybrid-gs-windows-amd64-${{ steps.ver.outputs.tag }}.zip" -Force

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Hybrid.GS ${{ steps.ver.outputs.tag }}
          files: hybrid-gs-windows-amd64-${{ steps.ver.outputs.tag }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true

  refresh-releases-folder:
    needs: windows-release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW='${{ inputs.tag }}'
          else
            RAW='${{ github.ref_name }}'
          fi
          RAW="${RAW#refs/tags/}"
          RAW="${RAW#v}"
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .tmp releases
          gh release download "${{ steps.ver.outputs.tag }}" --pattern 'hybrid-gs-windows-amd64-*.zip' --dir .tmp

      - name: Update releases folder
        run: |
          find releases -maxdepth 1 -type f -name '*.zip' -delete
          cp .tmp/*.zip releases/

      - name: Commit and push releases folder update
        run: |
          if [ -f releases/README.md ]; then
            sed -i -E "s/Current version: \*\*v[0-9][0-9.]*\*\*/Current version: **${{ steps.ver.outputs.tag }}**/" releases/README.md || true
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases
          if git diff --cached --quiet; then
            echo "No releases changes"
            exit 0
          fi
          git commit -m "chore(releases): refresh hybrid-gs windows asset for ${{ steps.ver.outputs.tag }}"
          git push
