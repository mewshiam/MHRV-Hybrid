name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (with or without v)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mhrv-rs-linux-amd64
            ext: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: mhrv-rs-linux-arm64
            ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mhrv-rs-linux-musl-amd64
            ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mhrv-rs-macos-amd64
            ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mhrv-rs-macos-arm64
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact: mhrv-rs-windows-amd64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --features ui --target ${{ matrix.target }}

      - name: Package unix artifacts
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mhrv-rs dist/
          cp target/${{ matrix.target }}/release/mhrv-rs-ui dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist mhrv-rs mhrv-rs-ui

      - name: Package windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target/${{ matrix.target }}/release/mhrv-rs.exe dist/
          Copy-Item target/${{ matrix.target }}/release/mhrv-rs-ui.exe dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw='${{ inputs.tag }}'
          else
            raw='${{ github.ref_name }}'
          fi
          raw="${raw#refs/tags/}"
          raw="${raw#v}"
          echo "tag=v$raw" >> "$GITHUB_OUTPUT"
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
